# Fork note: modified in this fork from upstream rohitg00/agentmemory. See NOTICE and LICENSE.
x-log-rotation: &log-rotation
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  iii-data-perms:
    image: alpine:3.21
    command:
      - sh
      - -lc
      - chown -R 65532:65532 /data && chmod 775 /data
    volumes:
      - iii-data:/data
    restart: "no"
    logging: *log-rotation

  iii-engine:
    image: ${AGENTMEMORY_III_DOCKER_IMAGE:-docker.io/iiidev/iii:0.11.3}
    depends_on:
      iii-data-perms:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:49134:49134"
      - "127.0.0.1:3111:3111"
      - "127.0.0.1:3112:3112"
      - "127.0.0.1:9464:9464"
    volumes:
      - iii-data:/data
      - ./iii-config.docker.yaml:/app/config.yaml:ro
    restart: unless-stopped
    logging: *log-rotation

  agentmemory-worker:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      iii-engine:
        condition: service_started
    env_file:
      - ./.env.local
    environment:
      AGENTMEMORY_URL: http://iii-engine:3111
      VIEWER_UPSTREAM_URL: http://iii-engine:3111
      VIEWER_HOST: 0.0.0.0
      III_ENGINE_URL: ws://iii-engine:49134
      III_REST_PORT: "3111"
      III_STREAMS_PORT: "3112"
    ports:
      - "127.0.0.1:3113:3113"
    healthcheck:
      test: ["CMD", "node", "/app/healthcheck.mjs"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    logging: *log-rotation

volumes:
  iii-data:
