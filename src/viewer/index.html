    async function loadOperations() {
      var el = document.getElementById('view-operations');
      el.innerHTML = '<div class="loading">Loading operations...</div>';
      var results = await Promise.all([
        apiPost('diagnostics', {}),
        apiGet('actions'),
        apiGet('frontier?limit=8'),
        apiGet('next'),
        apiGet('checkpoints'),
        apiGet('snapshots'),
        apiGet('facets/stats')
      ]);
      state.operations.diagnostics = results[0] || { checks: [], summary: { pass: 0, warn: 0, fail: 0, fixable: 0 } };
      state.operations.actions = (results[1] && results[1].actions) || [];
      state.operations.frontier = (results[2] && results[2].frontier) || [];
      state.operations.next = results[3] || { success: false, suggestion: null, message: 'No suggestion available' };
      state.operations.checkpoints = (results[4] && results[4].checkpoints) || [];
      state.operations.snapshots = (results[5] && results[5].snapshots) || [];
      state.operations.facetStats = results[6] || { dimensions: [], totalFacets: 0 };
      state.operations.loaded = true;
      renderOperations();
    }

    function renderOperations() {
      var el = document.getElementById('view-operations');
      var o = state.operations;
      var diagnostics = o.diagnostics || {};
      var checks = diagnostics.checks || [];
      var summary = diagnostics.summary || { pass: 0, warn: 0, fail: 0, fixable: 0 };
      var actions = o.actions || [];
      var frontier = o.frontier || [];
      var next = o.next || {};
      var checkpoints = o.checkpoints || [];
      var snapshots = o.snapshots || [];
      var facetStats = o.facetStats || { dimensions: [], totalFacets: 0 };

      var statusCounts = { pending: 0, blocked: 0, active: 0, done: 0, cancelled: 0 };
      actions.forEach(function(a) {
        var key = a.status || 'pending';
        statusCounts[key] = (statusCounts[key] || 0) + 1;
      });

      var checkpointCounts = { pending: 0, passed: 0, failed: 0, expired: 0 };
      checkpoints.forEach(function(cp) {
        var key = cp.status || 'pending';
        checkpointCounts[key] = (checkpointCounts[key] || 0) + 1;
      });

      var groupedChecks = {};
      checks.forEach(function(check) {
        var category = check.category || 'other';
        if (!groupedChecks[category]) {
          groupedChecks[category] = { pass: 0, warn: 0, fail: 0, fixable: 0 };
        }
        groupedChecks[category][check.status] = (groupedChecks[category][check.status] || 0) + 1;
        if (check.fixable) groupedChecks[category].fixable += 1;
      });

      var issueChecks = checks.filter(function(check) { return check.status !== 'pass'; });
      issueChecks.sort(function(a, b) {
        var rank = { fail: 0, warn: 1 };
        var ar = rank[a.status] !== undefined ? rank[a.status] : 2;
        var br = rank[b.status] !== undefined ? rank[b.status] : 2;
        return ar - br;
      });

      var html = '<div class="stats-grid">';
      html += '<div class="stat-card"><div class="label">Diagnostic Fails</div><div class="value">' + (summary.fail || 0) + '</div><div class="sub">' + (summary.fixable || 0) + ' fixable</div></div>';
      html += '<div class="stat-card"><div class="label">Warnings</div><div class="value">' + (summary.warn || 0) + '</div><div class="sub">' + (summary.pass || 0) + ' passing checks</div></div>';
      html += '<div class="stat-card"><div class="label">Open Actions</div><div class="value">' + ((statusCounts.pending || 0) + (statusCounts.blocked || 0) + (statusCounts.active || 0)) + '</div><div class="sub">' + actions.length + ' tracked</div></div>';
      html += '<div class="stat-card"><div class="label">Frontier</div><div class="value">' + frontier.length + '</div><div class="sub">' + (next && next.suggestion ? 'next suggested' : 'no suggestion') + '</div></div>';
      html += '<div class="stat-card"><div class="label">Checkpoints</div><div class="value">' + checkpoints.length + '</div><div class="sub">' + (checkpointCounts.pending || 0) + ' pending</div></div>';
      html += '<div class="stat-card"><div class="label">Snapshots</div><div class="value">' + snapshots.length + '</div><div class="sub">' + (snapshots.length > 0 ? 'history available' : 'not enabled or empty') + '</div></div>';
      html += '<div class="stat-card"><div class="label">Facets</div><div class="value">' + (facetStats.totalFacets || 0) + '</div><div class="sub">' + (((facetStats.dimensions || []).length) || 0) + ' dimensions</div></div>';
      html += '</div>';

      if (next && next.suggestion) {
        html += '<div class="card" style="margin-bottom:16px;border-width:2px;"><div class="card-title">Suggested Next Work</div>';
        html += '<div style="font-size:24px;color:var(--ink);font-family:var(--font-display);font-weight:700;line-height:1.2;margin-bottom:8px;">' + esc(next.suggestion.title || 'Untitled action') + '</div>';
        if (next.suggestion.description) {
          html += '<p style="font-size:14px;color:var(--ink-muted);line-height:1.7;margin-bottom:12px;">' + esc(next.suggestion.description) + '</p>';
        }
        html += '<div class="detail-row"><div class="dl">Priority</div><div class="dv" style="font-family:var(--font-mono);">' + esc(next.suggestion.priority || '-') + '</div></div>';
        html += '<div class="detail-row"><div class="dl">Score</div><div class="dv" style="font-family:var(--font-mono);">' + esc(next.suggestion.score || '-') + '</div></div>';
        html += '<div class="detail-row"><div class="dl">Action ID</div><div class="dv" style="font-family:var(--font-mono);font-size:12px;">' + esc(next.suggestion.actionId || '') + '</div></div>';
        if (next.suggestion.tags && next.suggestion.tags.length) {
          html += '<div style="margin-top:10px;">' + next.suggestion.tags.map(function(tag) {
            return '<span class="badge badge-muted" style="margin-right:4px;">' + esc(tag) + '</span>';
          }).join('') + '</div>';
        }
        if (next.message) {
          html += '<div style="margin-top:12px;font-size:11px;color:var(--ink-faint);font-family:var(--font-mono);">' + esc(next.message) + '</div>';
        }
        html += '</div>';
      } else if (next && next.message) {
        html += '<div class="card" style="margin-bottom:16px;"><div class="card-title">Suggested Next Work</div><div class="empty-state"><p>' + esc(next.message) + '</p></div></div>';
      }

      html += '<div class="two-col">';

      html += '<div class="card"><div class="card-title">Diagnostic Coverage</div>';
      var categories = Object.keys(groupedChecks).sort();
      if (categories.length === 0) {
        html += '<div class="empty-state"><p>No diagnostic data available yet</p></div>';
      } else {
        html += '<table><tr><th>Category</th><th>Fail</th><th>Warn</th><th>Pass</th><th>Fixable</th></tr>';
        categories.forEach(function(category) {
          var row = groupedChecks[category];
          html += '<tr><td style="color:var(--ink);font-weight:600;">' + esc(category) + '</td>';
          html += '<td style="color:' + ((row.fail || 0) > 0 ? 'var(--red)' : 'var(--ink-faint)') + ';font-family:var(--font-mono);">' + (row.fail || 0) + '</td>';
          html += '<td style="color:' + ((row.warn || 0) > 0 ? 'var(--yellow)' : 'var(--ink-faint)') + ';font-family:var(--font-mono);">' + (row.warn || 0) + '</td>';
          html += '<td style="color:' + ((row.pass || 0) > 0 ? 'var(--green)' : 'var(--ink-faint)') + ';font-family:var(--font-mono);">' + (row.pass || 0) + '</td>';
          html += '<td style="font-family:var(--font-mono);">' + (row.fixable || 0) + '</td></tr>';
        });
        html += '</table>';
      }
      html += '</div>';

      html += '<div class="card"><div class="card-title">Action Inventory</div>';
      html += '<div class="detail-row"><div class="dl">Pending</div><div class="dv" style="font-family:var(--font-mono);">' + (statusCounts.pending || 0) + '</div></div>';
      html += '<div class="detail-row"><div class="dl">Blocked</div><div class="dv" style="font-family:var(--font-mono);">' + (statusCounts.blocked || 0) + '</div></div>';
      html += '<div class="detail-row"><div class="dl">Active</div><div class="dv" style="font-family:var(--font-mono);">' + (statusCounts.active || 0) + '</div></div>';
      html += '<div class="detail-row"><div class="dl">Done</div><div class="dv" style="font-family:var(--font-mono);">' + (statusCounts.done || 0) + '</div></div>';
      html += '<div class="detail-row"><div class="dl">Cancelled</div><div class="dv" style="font-family:var(--font-mono);">' + (statusCounts.cancelled || 0) + '</div></div>';
      html += '<div class="detail-row"><div class="dl">Tracked</div><div class="dv" style="font-family:var(--font-mono);">' + actions.length + '</div></div>';
      html += '</div>';

      html += '</div>';

      html += '<div class="two-col" style="margin-top:16px;">';

      html += '<div class="card"><div class="card-title">Attention Needed</div>';
      if (issueChecks.length === 0) {
        html += '<div class="empty-state"><p>No current warnings or failures</p></div>';
      } else {
        issueChecks.slice(0, 12).forEach(function(check) {
          var badgeClass = check.status === 'fail' ? 'badge-red' : 'badge-yellow';
          html += '<div style="padding:8px 0;border-bottom:1px solid var(--border-light);">';
          html += '<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;"><span class="badge ' + badgeClass + '">' + esc(check.status) + '</span>';
          html += '<span class="badge badge-muted">' + esc(check.category || 'other') + '</span>';
          if (check.fixable) html += '<span class="badge badge-green">fixable</span>';
          html += '</div>';
          html += '<div style="font-size:13px;color:var(--ink);line-height:1.5;">' + esc(check.message || check.name || 'Issue') + '</div>';
          html += '</div>';
        });
      }
      html += '</div>';

      html += '<div class="card"><div class="card-title">Frontier</div>';
      if (frontier.length === 0) {
        html += '<div class="empty-state"><p>No unblocked actions available</p></div>';
      } else {
        html += '<table><tr><th>Action</th><th>Priority</th><th>Score</th><th>Lease</th></tr>';
        frontier.forEach(function(item) {
          var action = item.action || {};
          html += '<tr><td><div style="color:var(--ink);font-weight:600;">' + esc(action.title || action.id || 'Action') + '</div>';
          if (action.project) html += '<div style="font-size:10px;color:var(--ink-faint);font-family:var(--font-mono);margin-top:2px;">' + esc(action.project) + '</div>';
          html += '</td>';
          html += '<td style="font-family:var(--font-mono);">' + esc(action.priority || '-') + '</td>';
          html += '<td style="font-family:var(--font-mono);">' + esc(item.score || '-') + '</td>';
          html += '<td>' + (item.leased ? '<span class="badge badge-yellow">leased</span>' : '<span class="badge badge-green">free</span>') + '</td></tr>';
        });
        html += '</table>';
      }
      html += '</div>';

      html += '</div>';

      html += '<div class="two-col" style="margin-top:16px;">';

      html += '<div class="card"><div class="card-title">Checkpoints</div>';
      if (checkpoints.length === 0) {
        html += '<div class="empty-state"><p>No checkpoints recorded</p></div>';
      } else {
        html += '<div class="detail-row"><div class="dl">Pending</div><div class="dv" style="font-family:var(--font-mono);">' + (checkpointCounts.pending || 0) + '</div></div>';
        html += '<div class="detail-row"><div class="dl">Passed</div><div class="dv" style="font-family:var(--font-mono);">' + (checkpointCounts.passed || 0) + '</div></div>';
        html += '<div class="detail-row"><div class="dl">Failed</div><div class="dv" style="font-family:var(--font-mono);">' + (checkpointCounts.failed || 0) + '</div></div>';
        html += '<div class="detail-row"><div class="dl">Expired</div><div class="dv" style="font-family:var(--font-mono);">' + (checkpointCounts.expired || 0) + '</div></div>';
        html += '<table style="margin-top:12px;"><tr><th>Name</th><th>Type</th><th>Status</th></tr>';
        checkpoints.slice(0, 8).forEach(function(cp) {
          var cpBadge = cp.status === 'passed' ? 'badge-green' : cp.status === 'failed' ? 'badge-red' : cp.status === 'expired' ? 'badge-yellow' : 'badge-muted';
          html += '<tr><td><div style="color:var(--ink);font-weight:600;">' + esc(cp.name || cp.id) + '</div>';
          if (cp.linkedActionIds && cp.linkedActionIds.length) html += '<div style="font-size:10px;color:var(--ink-faint);font-family:var(--font-mono);margin-top:2px;">' + cp.linkedActionIds.length + ' linked action(s)</div>';
          html += '</td><td>' + esc(cp.type || 'external') + '</td><td><span class="badge ' + cpBadge + '">' + esc(cp.status || 'pending') + '</span></td></tr>';
        });
        html += '</table>';
      }
      html += '</div>';

      html += '<div class="card"><div class="card-title">Snapshots & Facets</div>';
      html += '<div style="margin-bottom:14px;">';
      html += '<div style="font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--ink-faint);margin-bottom:6px;font-family:var(--font-ui);">Snapshots</div>';
      if (snapshots.length === 0) {
        html += '<div style="font-size:13px;color:var(--ink-faint);font-style:italic;">Snapshot history is empty or snapshots are not enabled.</div>';
      } else {
        snapshots.slice(0, 5).forEach(function(snapshot) {
          html += '<div style="padding:6px 0;border-bottom:1px solid var(--border-light);">';
          html += '<div style="font-size:12px;color:var(--ink);font-weight:600;">' + esc(snapshot.message || 'Snapshot') + '</div>';
          html += '<div style="font-size:10px;color:var(--ink-faint);font-family:var(--font-mono);">' + esc(truncate(snapshot.commitHash || '', 12)) + ' · ' + esc(formatTime(snapshot.createdAt)) + '</div>';
          html += '</div>';
        });
      }
      html += '</div>';
      html += '<div>';
      html += '<div style="font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--ink-faint);margin-bottom:6px;font-family:var(--font-ui);">Facet Coverage</div>';
      if (!facetStats.dimensions || facetStats.dimensions.length === 0) {
        html += '<div style="font-size:13px;color:var(--ink-faint);font-style:italic;">No facet tags recorded yet.</div>';
      } else {
        facetStats.dimensions.slice(0, 6).forEach(function(dim) {
          var topValues = (dim.values || []).slice().sort(function(a, b) { return (b.count || 0) - (a.count || 0); }).slice(0, 3);
          html += '<div style="padding:6px 0;border-bottom:1px solid var(--border-light);">';
          html += '<div style="font-size:12px;color:var(--ink);font-weight:600;">' + esc(dim.dimension) + '</div>';
          html += '<div style="font-size:11px;color:var(--ink-faint);">' + topValues.map(function(v) { return esc(v.value) + ' (' + (v.count || 0) + ')'; }).join(' · ') + '</div>';
          html += '</div>';
        });
      }
      html += '</div>';
      html += '</div>';

      html += '</div>';

      html += '<div style="text-align:center;margin-top:20px;"><button class="btn btn-primary" data-action="refresh-operations">Refresh</button></div>';
      el.innerHTML = html;
    }

    function refreshOperations() {
      state.operations.loaded = false;
      loadOperations();
    }

    async function loadProfile() {
      var el = document.getElementById('view-profile');
      el.innerHTML = '<div class="loading">Loading profile...</div>';
      var sessResult = await apiGet('sessions?limit=200');
      var sessions = (sessResult && sessResult.sessions) || [];

      var projects = {};
      sessions.forEach(function(s) { if (s.project) projects[s.project] = true; });
      state.profile.projects = Object.keys(projects).sort();
      state.profile.loaded = true;

      if (state.profile.projects.length > 0 && !state.profile.selectedProject) {
        state.profile.selectedProject = state.profile.projects[0];
      }

      renderProfileToolbar();
      if (state.profile.selectedProject) await loadProfileData();
    }

    function renderProfileToolbar() {
      var el = document.getElementById('view-profile');
      var html = '<div class="toolbar">';
      html += '<select id="profile-project">';
      if (state.profile.projects.length === 0) {
        html += '<option value="">No projects</option>';
      } else {
        state.profile.projects.forEach(function(p) {
          html += '<option value="' + esc(p) + '"' + (state.profile.selectedProject === p ? ' selected' : '') + '>' + esc(p) + '</option>';
        });
      }
      html += '</select></div>';
      html += '<div id="profile-content"></div>';
      el.innerHTML = html;

      document.getElementById('profile-project').addEventListener('change', function() {
        state.profile.selectedProject = this.value;
        loadProfileData();
      });
    }

    async function loadProfileData() {
      var content = document.getElementById('profile-content');
      if (!content || !state.profile.selectedProject) return;
      content.innerHTML = '<div class="loading">Loading profile data...</div>';
      var result = await apiGet('profile?project=' + encodeURIComponent(state.profile.selectedProject));
      state.profile.data = (result && result.profile) ? result.profile : result;
      renderProfile();
    }

    function renderProfile() {
      var content = document.getElementById('profile-content');
      if (!content) return;
      var p = state.profile.data;

      if (!p) {
        content.innerHTML = '<div class="empty-state"><div class="empty-icon">&#128203;</div><p>No profile data for this project</p></div>';
        return;
      }

      var html = '<div class="two-col">';

      html += '<div class="card"><div class="card-title">Top Concepts</div>';
      var concepts = p.topConcepts || [];
      if (concepts.length === 0) {
        html += '<div style="font-size:13px;color:var(--ink-faint);font-style:italic;">No concepts yet</div>';
      } else {
        var maxC = Math.max.apply(null, concepts.map(function(c) { return c.frequency; })) || 1;
        html += '<div class="bar-chart">';
        concepts.slice(0, 10).forEach(function(c) {
          var pct = Math.round((c.frequency / maxC) * 100);
          html += '<div class="bar-row"><span class="bar-label">' + esc(c.concept) + '</span><div class="bar-track"><div class="bar-fill" style="width:' + pct + '%;background:var(--yellow);"></div></div><span class="bar-value">' + c.frequency + '</span></div>';
        });
        html += '</div>';
      }
      html += '</div>';

      html += '<div class="card"><div class="card-title">Top Files</div>';
      var files = p.topFiles || [];
      if (files.length === 0) {
        html += '<div style="font-size:13px;color:var(--ink-faint);font-style:italic;">No files yet</div>';
      } else {
        var maxF = Math.max.apply(null, files.map(function(f) { return f.frequency; })) || 1;
        html += '<div class="bar-chart">';
        files.slice(0, 10).forEach(function(f) {
          var pct = Math.round((f.frequency / maxF) * 100);
          html += '<div class="bar-row"><span class="bar-label">' + esc(f.file.split('/').pop()) + '</span><div class="bar-track"><div class="bar-fill" style="width:' + pct + '%;background:var(--green);"></div></div><span class="bar-value">' + f.frequency + '</span></div>';
        });
        html += '</div>';
      }
      html += '</div>';

      html += '</div>';

      html += '<div class="card" style="margin-top:16px;"><div class="card-title">Conventions</div>';
      var conventions = p.conventions || [];
      if (conventions.length === 0) {
        html += '<div style="font-size:13px;color:var(--ink-faint);font-style:italic;">No conventions detected yet</div>';
      } else {
        html += '<ul style="padding-left:16px;">';
        conventions.forEach(function(c) { html += '<li style="font-size:13px;color:var(--ink-muted);margin-bottom:4px;">' + esc(c) + '</li>'; });
        html += '</ul>';
      }
      html += '</div>';

      if (p.summary) {
        html += '<div class="card" style="margin-top:16px;"><div class="card-title">Project Summary</div>';
        html += '<p style="font-size:13px;color:var(--ink-muted);line-height:1.7;">' + esc(p.summary) + '</p></div>';
      }

      var stats = '<div class="card" style="margin-top:16px;"><div class="card-title">Project Stats</div>';
      stats += '<div class="detail-row"><div class="dl">Sessions</div><div class="dv" style="font-family:var(--font-mono);">' + (p.sessionCount || 0) + '</div></div>';
      stats += '<div class="detail-row"><div class="dl">Total Obs</div><div class="dv" style="font-family:var(--font-mono);">' + (p.totalObservations || 0) + '</div></div>';
      stats += '<div class="detail-row"><div class="dl">Updated</div><div class="dv" style="font-family:var(--font-mono);font-size:12px;">' + esc(formatTime(p.updatedAt)) + '</div></div>';
      stats += '</div>';

      content.innerHTML = html + stats;
    }

    var wsReconnectTimer = null;
    var wsRetries = 0;
    var WS_MAX_RETRIES = 10;
    var directFailed = false;
    var directFailures = 0;
    var DIRECT_FAILURE_THRESHOLD = 2;

    function connectWs() {
      if (wsRetries >= WS_MAX_RETRIES) return;
      var useDirect = !directFailed;
      var ws;
      try {
        ws = new WebSocket(useDirect ? WS_DIRECT_URL : WS_URL);
        ws.__direct = useDirect;
      } catch (_) {
        ws = new WebSocket(WS_URL);
        ws.__direct = false;
      }
      try {
        ws.onopen = function() {
          if (state.ws !== ws) return;
          wsRetries = 0;
          if (ws.__direct) {
            directFailures = 0;
            directFailed = false;
          }
          if (!ws.__direct) {
            ws.send(JSON.stringify({
              type: 'join',
              data: {
                subscriptionId: 'viewer-' + Date.now(),
                streamName: 'mem-live',
                groupId: 'viewer'
              }
            }));
          }
          document.getElementById('ws-status').textContent = 'live';
          document.getElementById('ws-status').className = 'ws-status connected';
        };
        ws.onmessage = function(e) {
          if (state.ws !== ws) return;
          try {
            var msg = JSON.parse(e.data);
            if (msg.type === 'stream' && msg.event) {
              handleStreamEvent(msg);
            } else if (msg.event_type && msg.data) {
              handleStreamEvent({ event: { type: 'create', data: msg.data, event_type: msg.event_type } });
            }
          } catch {}
        };
        ws.onclose = function() {
          if (state.ws !== ws) return;
          if (ws.__direct) {
            directFailures += 1;
            if (directFailures >= DIRECT_FAILURE_THRESHOLD) {
              directFailed = true;
            }
          }
          document.getElementById('ws-status').textContent = 'reconnecting...';
          document.getElementById('ws-status').className = 'ws-status disconnected';
          wsRetries++;
          if (wsRetries < WS_MAX_RETRIES) {
            wsReconnectTimer = setTimeout(connectWs, 2000 + Math.min(wsRetries * 1000, 8000));
          } else {
            document.getElementById('ws-status').textContent = 'disconnected';
          }
        };
        ws.onerror = function() {
          if (state.ws !== ws) return;
          try { ws.close(); } catch {}
        };
        state.ws = ws;
      } catch {
        wsRetries++;
        if (wsRetries < WS_MAX_RETRIES) {
          wsReconnectTimer = setTimeout(connectWs, 2000 + Math.min(wsRetries * 1000, 8000));
        }
      }
    }

    function looksLikeObservation(obj) {
      return !!(obj && typeof obj === 'object' && obj.id && obj.timestamp);
    }

    function handleStreamEvent(msg) {
      var evt = msg.event;
      var observation;
      if (!evt) return;
      if (evt.event_type && evt.event_type !== 'observation' && evt.event_type !== 'create' && evt.event_type !== 'update') {
        return;
      }
      if (evt.type === 'event' && evt.data) {
        observation = evt.data.observation || evt.data;
        if (looksLikeObservation(observation)) {
          routeWsMessage({ observation: observation });
        }
        return;
      }
      if ((evt.type === 'create' || evt.type === 'update') && evt.data) {
        var payload = evt.data;
        observation = payload.observation || payload;
        if (looksLikeObservation(observation)) {
          routeWsMessage({ observation: observation });
        }
      } else if (evt.type === 'sync') {
        var items = Array.isArray(evt.data) ? evt.data : [];
        items.forEach(function(item) {
          var payload = item.data || item;
          observation = payload.observation || payload;
          if (looksLikeObservation(observation)) {
            routeWsMessage({ observation: observation });
          }
        });
      }
    }

    function routeWsMessage(msg) {
      if (state.activeTab === 'timeline' && msg.observation) {
        if (!state.timeline.sessionId || msg.observation.sessionId === state.timeline.sessionId) {
          var existing = state.timeline.observations.findIndex(function(o) { return o.id === msg.observation.id; });
          if (existing >= 0) {
            state.timeline.observations[existing] = msg.observation;
          } else {
            state.timeline.observations.unshift(msg.observation);
          }
          renderObservations();
        }
      }
      if (state.activeGroup === 'overview') {
        state.dashboard.loaded = false;
        scheduleDashboardRefresh(500);
      }
      if (state.activeTab === 'activity' && msg.observation) {
        state.activity.observations.unshift(msg.observation);
        renderActivity();
      }
    }

    document.getElementById('tab-bar').addEventListener('click', function(e) {
      if (e.target.tagName === 'BUTTON' && e.target.dataset.group) {
        switchGroup(e.target.dataset.group);
      }
    });
    document.getElementById('subtab-bar').addEventListener('click', function(e) {
      if (e.target.tagName === 'BUTTON' && e.target.dataset.tab) {
        switchTab(e.target.dataset.tab);
      }
    });
    document.addEventListener('click', function(e) {
      if (!(e.target instanceof Element)) return;
      var target = e.target.closest('[data-action]');
      if (!target) return;
      var action = target.getAttribute('data-action');
      if (!action) return;

      if (action === 'toggle-theme') {
        toggleTheme();
        return;
      }
      if (action === 'refresh-dashboard') {
        refreshDashboard();
        return;
      }
      if (action === 'refresh-operations') {
        refreshOperations();
        return;
      }
      if (action === 'refresh-coordination') {
        state.coordination.loaded = false;
        loadCoordination();
        return;
      }
      if (action === 'goto-tab') {
        var targetTab = target.getAttribute('data-target-tab');
        if (targetTab) switchTab(targetTab);
        return;
      }
      if (action === 'zoom-graph') {
        zoomGraph(parseInt(target.getAttribute('data-dir') || '0', 10));
        return;
      }
      if (action === 'recenter-graph') {
        recenterGraph();
        return;
      }
      if (action === 'rebuild-graph') {
        rebuildGraph();
        return;
      }
      if (action === 'expand-node') {
        var nodeId = target.getAttribute('data-node-id');
        if (nodeId) expandNode(nodeId);
        return;
      }
      if (action === 'delete-memory') {
        deleteMemory(
          target.getAttribute('data-memory-id') || '',
          target.getAttribute('data-memory-title') || '',
        );
        return;
      }
      if (action === 'close-modal') {
        closeModal();
        return;
      }
      if (action === 'confirm-delete-memory') {
        var memoryId = target.getAttribute('data-memory-id');
        if (memoryId) confirmDeleteMemory(memoryId);
        return;
      }
      if (action === 'timeline-filter') {
        setTlTypeFilter(target.getAttribute('data-type-filter') || '');
        return;
      }
      if (action === 'timeline-page') {
        var page = parseInt(target.getAttribute('data-page') || '', 10);
        if (!Number.isNaN(page)) tlPage(page);
        return;
      }
      if (action === 'select-session') {
        var sessionId = target.getAttribute('data-session-id');
        if (sessionId) selectSession(sessionId);
        return;
      }
      if (action === 'end-session') {
        var endSessionId = target.getAttribute('data-session-id');
        if (endSessionId) endSession(endSessionId);
        return;
      }
      if (action === 'summarize-session') {
        var summarizeSessionId = target.getAttribute('data-session-id');
        if (summarizeSessionId) summarizeSession(summarizeSessionId, target);
        return;
      }
      if (action === 'toggle-audit') {
        var auditIndex = parseInt(target.getAttribute('data-audit-index') || '', 10);
        if (!Number.isNaN(auditIndex)) toggleAuditDetail(auditIndex);
      }
    });
    document.getElementById('modal-overlay').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });

    renderTabShell();
    loadTab('dashboard');
    connectWs();
    startDashboardAutoRefresh();
  </script>
</body>
</html>
